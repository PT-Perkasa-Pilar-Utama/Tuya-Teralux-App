services:
  terminal-backend:
    image: ghcr.io/farismnrr/terminal-backend:latest
    container_name: terminal-backend
    ports:
      - "8081:8080"
    env_file:
      - .env.prod
    depends_on:
      terminal-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./bin:/app/models
      - ./templates:/app/templates

  terminal-db:
    image: mysql:8.0
    container_name: terminal-db
    env_file:
      - .env.prod
    volumes:
      - ./tmp/mysql_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    restart: unless-stopped

