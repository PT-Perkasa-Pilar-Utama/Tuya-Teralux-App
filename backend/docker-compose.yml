services:
  sensio-backend:
    image: ghcr.io/farismnrr/sensio-backend:latest
    ports:
      - "8081:8080"
    env_file:
      - .env.prod
    depends_on:
      sensio-db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15m
    volumes:
      - ./bin:/app/models
      - ./templates:/app/templates
      - ./uploads:/app/uploads

  sensio-db:
    image: mysql:8.0
    container_name: sensio-db
    env_file:
      - .env.prod
    volumes:
      - ./tmp/mysql_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    restart: unless-stopped
