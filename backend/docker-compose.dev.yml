services:
  mysql:
    image: mysql:8.0
    container_name: dev-mysql
    restart: unless-stopped

    env_file:
      - .env

    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"

    ports:
      - "${MYSQL_PORT}:3306"

    volumes:
      - mysql_dev_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

  emqx-auth-service:
    image: ghcr.io/farismnrr/emqx-auth-service:latest
    container_name: emqx-auth-service
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5500/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
      
volumes:
  mysql_dev_data: