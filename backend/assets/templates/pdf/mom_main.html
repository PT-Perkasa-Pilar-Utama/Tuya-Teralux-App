<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Meeting Intelligence Report</title>
    <style>
      /* External fonts removed for offline reliability. Using system fonts. */

      :root {
        --brand-main: #004d40;
        --brand-light: #e0f2f1;
        --brand-accent: #00796b;
        --text-main: #333333;
        --text-muted: #666666;
        --border-color: #b2dfdb;
      }

      @page {
        margin: 0.75in 0.6in; /* Matches Go-Rod margin for consistency and preview */
      }

      body {
        font-family: "Inter", "Liberation Sans", Roboto, Arial, sans-serif;
        color: var(--text-main);
        line-height: 1.6;
        margin: 0;
        padding: 0; /* Padding is now managed by @page and margins */
        background-color: white;
        font-size: 14px;
      }

      /* --- HEADER (KOP SURAT) --- */
      .header {
        text-align: center;
        border-bottom: 3px solid var(--brand-main);
        padding-bottom: 20px;
        margin-bottom: 30px;
      }
      .header img {
        max-width: 100px;
        margin-bottom: 15px;
      }
      .header h1 {
        color: var(--brand-main);
        margin: 0;
        font-size: 24px;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 700;
      }
      .header p {
        color: var(--text-muted);
        margin: 5px 0 0;
        font-size: 12px;
        font-style: italic;
      }

      /* --- METADATA CARD --- */
      .meta-card {
        background-color: var(--brand-light);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 35px;
      }
      .meta-card h3 {
        color: var(--brand-accent);
        margin-top: 0;
        margin-bottom: 15px;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .meta-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .meta-table td {
        padding: 6px 0;
        vertical-align: top;
      }
      .meta-table .label {
        width: 120px;
        color: var(--text-muted);
        font-weight: 500;
      }
      .meta-table .value {
        font-weight: 600;
        color: var(--text-main);
      }

      /* --- RAG SUMMARY CONTENT --- */
      .summary-body h1 {
        color: var(--brand-main);
        font-size: 18px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 8px;
        margin-top: 35px;
        margin-bottom: 15px;
      }
      .summary-body h2 {
        color: var(--brand-accent);
        font-size: 16px;
        margin-top: 25px;
        margin-bottom: 12px;
      }
      .summary-body h3,
      .summary-body h4 {
        color: var(--text-main);
        font-size: 14px;
        margin-top: 20px;
        margin-bottom: 10px;
      }

      /* Prevent headers and lists from breaking awkwardally */
      .summary-body h1,
      .summary-body h2,
      .summary-body h3 {
        break-after: avoid;
      }

      .summary-body p,
      .summary-body li {
        break-inside: auto;
      }
      .summary-body p {
        margin-bottom: 15px;
      }
      .summary-body ul,
      .summary-body ol {
        margin-top: 0;
        margin-bottom: 15px;
        padding-left: 20px;
      }
      .summary-body li {
        margin-bottom: 6px;
      }

      /* Tables generated by Markdown */
      .summary-body table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
        font-size: 13px;
        break-inside: avoid; /* Prevent table from splitting across pages */
      }
      .summary-body th,
      .summary-body td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: left;
      }
      .summary-body th {
        background-color: #f5f5f5;
        color: var(--brand-main);
        font-weight: 600;
      }
      .summary-body tr:nth-child(even) {
        background-color: #fafafa;
      }

      /* --- FOOTER --- */
      .footer {
        text-align: center;
        border-top: 1px solid #eee;
        padding-top: 20px;
        margin-top: 50px;
        color: var(--text-muted);
        font-size: 11px;
      }
      .footer p {
        margin: 4px 0;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="header">
      <!-- Logo data URI is injected by Go renderer -->
      <img src="{{.LogoDataURI}}" alt="Logo" />
      <h1>Meeting Intelligence Report</h1>
      <p>Powered by {{.CompanyName}}</p>
    </div>

    <!-- METADATA CARD -->
    <div class="meta-card">
      <h3>{{.LblMeetingInfo}}</h3>
      <table class="meta-table">
        <tr>
          <td class="label">{{.LblDate}}</td>
          <td class="value">: {{.Date}}</td>
        </tr>
        <tr>
          <td class="label">{{.LblLocation}}</td>
          <td class="value">: {{.Location}}</td>
        </tr>
        <tr>
          <td class="label">{{.LblRoom}}</td>
          <td class="value">: {{.Room}}</td>
        </tr>
        <tr>
          <td class="label">{{.LblParticipants}}</td>
          <td class="value">: {{.Participants}}</td>
        </tr>
      </table>
    </div>

    <!-- SUMMARY CONTENT -->
    <div class="summary-body">{{.SummaryHTML}}</div>

    <!-- FOOTER -->
    <div class="footer">
      <p>&copy; 2026 {{.CompanyName}}. {{.LblFooterRights}}</p>
      <p>{{.LblFooterGenerated}}</p>
    </div>
  </body>
</html>
