      endpoint:
        type: string
      error:
        example: gemini api returned status 503
        type: string
      execution_result:
        description: holds the response from the fetched endpoint
      expires_at:
        type: string
      expires_in_seconds:
        type: integer
      headers:
        additionalProperties:
          type: string
        type: object
      language:
        type: string
      mac_address:
        type: string
      meeting_context:
        type: string
      method:
        type: string
      open_issues:
        items:
          $ref: '#/definitions/dtos.OpenIssue'
        type: array
      pdf_url:
        type: string
      result:
        example: The meeting discussed...
        type: string
      risks:
