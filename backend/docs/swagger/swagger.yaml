basePath: /
definitions:
  dtos.ActionDTO:
    properties:
      code:
        type: string
      device_id:
        type: string
      remote_id:
        type: string
      topic:
        type: string
      value: {}
    type: object
  dtos.ActionItem:
    properties:
      deadline:
        type: string
      id:
        type: integer
      pic:
        description: Person in charge (may be empty if not specified)
        type: string
      status:
        type: string
      task:
        type: string
    type: object
  dtos.AsyncTranscriptionResultDTO:
    properties:
      confidence_summary:
        $ref: '#/definitions/dtos.ConfidenceSummary'
      detected_language:
        example: id
        type: string
      normalization_applied:
        description: Whether safe normalization was applied
        type: boolean
      refined_text:
        example: Hello world
        type: string
      segments:
        items:
          $ref: '#/definitions/dtos.TranscriptSegment'
        type: array
      transcript_format:
        $ref: '#/definitions/dtos.TranscriptFormat'
      transcription:
        example: Halo dunia
        type: string
      utterances:
        description: Optional structured artifacts (backward compatible - empty when
          not available)
        items:
          $ref: '#/definitions/dtos.Utterance'
        type: array
    type: object
  dtos.AsyncTranscriptionStatusDTO:
    properties:
      duration_seconds:
        example: 1.5
        type: number
      error:
        example: service unavailable
        type: string
      expires_at:
        type: string
      expires_in_seconds:
        type: integer
      mac_address:
        type: string
      result:
        $ref: '#/definitions/dtos.AsyncTranscriptionResultDTO'
      started_at:
        example: "2026-02-21T11:00:00Z"
        type: string
      status:
        example: completed
        type: string
      terminal_id:
        type: string
      trigger:
        example: /api/whisper/models/gemini
        type: string
    type: object
  dtos.ConfidenceSummary:
    properties:
