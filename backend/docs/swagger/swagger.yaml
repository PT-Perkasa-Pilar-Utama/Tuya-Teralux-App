          $ref: '#/definitions/dtos.Risk'
        type: array
      source_language:
        type: string
      speaker_coverage:
        $ref: '#/definitions/dtos.SpeakerCoverage'
      started_at:
        example: "2026-02-21T11:00:00Z"
        type: string
      status:
        example: completed
        type: string
      summary:
        description: Alias for Result in summary tasks
        type: string
      summary_mode:
        description: '"single_pass" or "hierarchical_structured"'
        type: string
      summary_version:
        description: Optional structured summary artifacts (backward compatible -
          empty when not available)
        type: string
      translated_from_language:
        type: string
      trigger:
        example: /api/rag/summary
        type: string
    type: object
  dtos.RAGSummaryRequestDTO:
