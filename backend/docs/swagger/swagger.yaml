      compression_ratio:
        type: number
      coverage_ratio:
        description: processed_windows / total_windows
        type: number
      empty_windows:
        description: Windows with no extractable content
        type: integer
      processed_windows:
        type: integer
      source_chars:
        type: integer
      summary_chars:
        type: integer
      total_windows:
        type: integer
