name: Backend OpenAPI Check

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  openapi-check:
    name: Validate OpenAPI 3.1 Spec
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install Swag
        run: go install github.com/swaggo/swag/cmd/swag@latest

      - name: Build OpenAPI Tools
        run: make openapi-tools

      - name: Generate Swagger 2.0
        run: make swagger

      - name: Convert to OpenAPI 3.1
        run: make generate-openapi

      - name: Validate OpenAPI 3.1
        run: make validate-openapi

      - name: Run Route Contract Tests
        run: go test ./domain/common/utils/... -run TestOpenAPI -v

      - name: Check for Uncommitted Changes
        run: |
          if ! git diff --exit-code -- docs/openapi/; then
            echo "::error::Generated OpenAPI docs are not committed!"
            echo "::error::Please run 'make openapi' and commit the changes."
            exit 1
          fi
          echo "✅ OpenAPI docs are in sync with code"

      - name: Upload OpenAPI Spec Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: openapi-spec
          path: backend/docs/openapi/
          retention-days: 7
